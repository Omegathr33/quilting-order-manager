<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Quilting Business Manager</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginView" class="login-screen">
  <h1 id="loginBrand">Quilting Business Manager</h1>
  <form id="loginForm" class="form">
    <label class="form-field">
      <span>Email</span>
      <input type="email" id="loginEmail" required autocomplete="username">
    </label>
    <label class="form-field">
      <span>Password</span>
      <input type="password" id="loginPassword" required autocomplete="current-password">
    </label>
    <p id="loginError" class="login-error" hidden></p>
    <button type="submit" class="btn btn-primary">Log in</button>
  </form>
  <p id="loginStatus" class="login-status"></p>
</div>

<div id="appShell" class="app-shell" hidden>
  <header class="topbar">
    <span id="appBrand">Quilting Business Manager</span>
    <button id="syncStatusBtn" class="sync-status" title="Refresh data">&#8635;</button>
  </header>

  <main class="page">

    <section id="view-home" class="view">
      <h2 class="section-title">Due soon</h2>
      <ul id="homeDueList" class="event-list"></ul>

      <h2 class="section-title">Open tasks</h2>
      <ul id="homeTaskList" class="event-list"></ul>
      <form id="quickTaskForm" class="form form-inline-add">
        <input type="text" id="quickTaskDescription" placeholder="New task" required>
        <button type="submit" class="btn btn-secondary">Add</button>
      </form>
    </section>

    <section id="view-orders" class="view" hidden>
      <h2 class="section-title">Active orders</h2>
      <div id="ordersList" class="card-list"></div>
    </section>

    <section id="view-new-order" class="view" hidden>
      <h2 class="section-title">New order</h2>
      <div class="grand-total-display">
        <span class="gt-label">Grand Total</span>
        <span class="gt-value" id="grandTotalDisplay">$0.00</span>
      </div>

      <form id="newOrderForm" class="form">

        <section class="form-section">
          <h3 class="section-title">Customer</h3>
          <label class="form-field">
            <span>Search existing customer</span>
            <input type="text" id="customerSearch" placeholder="Type a name or phone..." autocomplete="off">
          </label>
          <div id="customerSuggestions" class="suggestions"></div>
          <input type="hidden" id="customer_sync_id">
          <label class="form-field"><span>Name *</span><input type="text" id="customer_name" required></label>
          <label class="form-field"><span>Phone *</span><input type="text" id="customer_phone" required></label>
          <label class="form-field"><span>Address *</span><input type="text" id="customer_address" required></label>
          <label class="form-field"><span>Email</span><input type="text" id="customer_email"></label>
        </section>

        <section class="form-section">
          <h3 class="section-title">Scheduling</h3>
          <label class="form-field"><span>Date In *</span><input type="date" id="date_in" required></label>
          <label class="form-field"><span>Date Due *</span><input type="date" id="due_date" required></label>
        </section>

        <section class="form-section">
          <h3 class="section-title">Fabric</h3>
          <label class="form-field"><span>Front width (in) *</span><input type="number" step="0.01" min="0" id="front_fabric_width" required></label>
          <label class="form-field"><span>Front height (in) *</span><input type="number" step="0.01" min="0" id="front_fabric_height" required></label>
          <p class="field-hint" id="frontSqInHint">= 0 sq in</p>
          <label class="form-field"><span>Back width (in) *</span><input type="number" step="0.01" min="0" id="back_fabric_width" required></label>
          <label class="form-field"><span>Back height (in) *</span><input type="number" step="0.01" min="0" id="back_fabric_height" required></label>
        </section>

        <section class="form-section">
          <h3 class="section-title">Quilting</h3>
          <label class="form-field checkbox-pair-field">
            <span>Quilting design</span>
            <input type="text" id="quilting_design">
            <label class="checkbox-label"><input type="checkbox" id="quilting_design_no_pref"> No preference</label>
          </label>
          <label class="form-field">
            <span>Quilting size *</span>
            <select id="quilting_size" required></select>
          </label>
        </section>

        <section class="form-section">
          <h3 class="section-title">Batting</h3>
          <label class="form-field">
            <span>Batting type *</span>
            <select id="batting_type" required></select>
            <label class="checkbox-label"><input type="checkbox" id="batting_type_no_pref"> Customer had no preference</label>
          </label>
          <label class="form-field"><span>Batting size (in)</span><input type="number" step="0.01" min="0" id="batting_size"></label>
        </section>

        <section class="form-section">
          <h3 class="section-title">Thread</h3>
          <label class="form-field checkbox-pair-field">
            <span>Top thread *</span>
            <input type="text" id="top_thread">
            <label class="checkbox-label"><input type="checkbox" id="top_thread_no_pref"> No preference</label>
          </label>
          <label class="form-field checkbox-pair-field">
            <span>Bottom thread *</span>
            <input type="text" id="bottom_thread">
            <label class="checkbox-label"><input type="checkbox" id="bottom_thread_same_as_top"> Same as top</label>
          </label>
        </section>

        <section class="form-section">
          <h3 class="section-title">Extra work &amp; charges</h3>
          <label class="form-field"><span>Seaming ($)</span><input type="number" step="0.01" min="0" id="seaming_cost"></label>
          <label class="form-field"><span>Piecing ($)</span><input type="number" step="0.01" min="0" id="piecing_cost"></label>
          <label class="form-field"><span>Completed quilt purchase ($)</span><input type="number" step="0.01" min="0" id="completed_quilt_purchase"></label>

          <label class="form-field">
            <span>Binding *</span>
            <select id="binding_who" required>
              <option>Customer will do it</option>
              <option>Business will do it</option>
            </select>
          </label>
          <div id="bindingExtra" class="binding-extra">
            <label class="form-field">
              <span>Cut type</span>
              <select id="binding_cut_type">
                <option>Cross Cut</option>
                <option>Bias Cut</option>
              </select>
            </label>
            <label class="form-field"><span>Color</span><input type="text" id="binding_color"></label>
          </div>
        </section>

        <section class="form-section">
          <h3 class="section-title">Notes</h3>
          <label class="form-field"><textarea id="notes" rows="3"></textarea></label>
        </section>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Save order</button>
        </div>
      </form>
    </section>

  </main>

  <nav class="bottomnav">
    <button data-view="home" class="navbtn is-active">Home</button>
    <button data-view="orders" class="navbtn">Orders</button>
    <button data-view="new-order" class="navbtn">+ New</button>
    <button id="logoutBtn" class="navbtn">Log out</button>
  </nav>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
</body>
</html>
